<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Semak</title>
    <link rel="icon" href="img/Semak_Logotipo.png" type="image/png">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/practice.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <img src="img/Semak_Logotipo_Headerpng.png" alt="Semak Logo">
        </div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="camera.html">Cámara</a>
            <a href="practice.html">Prácticas</a>
            <a href="login.html">Acceso</a>
        </nav>
    </header>

    <div class="practice-container">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="timeline">

            </div>
        </div>

        <!-- CONTENIDO -->
        <div class="main-content">
            <div class="video-title" id="videoTitle">
                Ningún video seleccionado
            </div>
            <div class="video-container" id="videoContainer">
                <p style="opacity:0.7;">Selecciona un video para comenzar</p>
            </div>

            <div class="action-bar">
                <button class="btn-primary" id="openQuiz">
                    Responder preguntas
                </button>

                <div id="scoreDisplay" class="score-box">
                    Resultado: 0/5
                </div>
            </div>

        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="questionModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">✖</span>
            <h2>Preguntas</h2>
            <form id="quizForm"></form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/practice.js"></script>

</body>

</html>
