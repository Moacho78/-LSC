<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="styles/styles.css">
<link rel="stylesheet" href="styles/login.css">
</head>

<body class="login-body">

<header class="navbar">
    <div class="logo">🤟 Semak</div>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="camera.html">Cámara</a>
        <a href="login.html" class="btn-nav">Entrar</a>
    </nav>
</header>

<div class="login-container">

    <div class="login-card">

        <img src="img/logo.png" id="logo" alt="Semak Logo">

        <p id="subtitle">Inicio de sesión</p>

        <div class="form-group" id="nameGroup" style="display:none;">
            <label>Nombre</label>
            <input type="text" id="name" placeholder="Tu nombre">
        </div>

        <div class="form-group" id="deptGroup" style="display:none;">
    <label>Departamento</label>

    <select id="department">
        <option value="">Selecciona un departamento</option>
        <option>Amazonas</option>
        <option>Antioquia</option>
        <option>Arauca</option>
        <option>Atlántico</option>
        <option>Bolívar</option>
        <option>Bogotá D.C.</option>
        <option>Boyacá</option>
        <option>Caldas</option>
        <option>Caquetá</option>
        <option>Casanare</option>
        <option>Cauca</option>
        <option>Cesar</option>
        <option>Chocó</option>
        <option>Córdoba</option>
        <option>Cundinamarca</option>
        <option>Guainía</option>
        <option>Guaviare</option>
        <option>Huila</option>
        <option>La Guajira</option>
        <option>Magdalena</option>
        <option>Meta</option>
        <option>Nariño</option>
        <option>Norte de Santander</option>
        <option>Putumayo</option>
        <option>Quindío</option>
        <option>Risaralda</option>
        <option>San Andrés y Providencia</option>
        <option>Santander</option>
        <option>Sucre</option>
        <option>Tolima</option>
        <option>Valle del Cauca</option>
        <option>Vaupés</option>
        <option>Vichada</option>
    </select>

</div>

        <div class="form-group">
            <label>Correo</label>
            <input type="email" id="email" placeholder="correo@email.com">
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-main" id="mainBtn">Ingresar</button>

        <span class="small">
            <span id="toggleText">¿No tienes cuenta?</span>
            <a href="#" id="toggleLink">Regístrate</a>
        </span>

    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/navbar.js"></script>
</body>
</html>
