<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="styles/styles.css">
<link rel="stylesheet" href="styles/login.css">
</head>

<body class="login-body">

<header class="navbar">
    <div class="logo">🤟 Feelitg</div>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="camera.html">Cámara</a>
        <a href="login.html" class="btn-nav">Entrar</a>
    </nav>
</header>

<div class="login-container">
    <div class="login-image">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    </div>
    <div class="login-card">

        <h2 id="title">🤟 Feelitg</h2>
        <p id="subtitle">Inicio de sesión</p>

        <input type="email" id="email" placeholder="Correo">
        <input type="password" id="password" placeholder="Contraseña">

        <button class="btn-main" id="mainBtn">Ingresar</button>

        <span class="small">
            <span id="toggleText">¿No tienes cuenta?</span>
            <a href="#" id="toggleLink">Regístrate</a>
        </span>

    </div>

</div>

<script src="js/auth.js"></script>
<script src="js/navbar.js"></script>
</body>
</html>
